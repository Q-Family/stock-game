name: Daily Stock Price Sync
on:
  schedule:
    - cron: '0 22 * * 1-5' # Runs at 5:00 PM EST (10:00 PM UTC) Mon-Fri
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Sync Script
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          JSONBIN_MASTER_KEY: ${{ secrets.JSONBIN_MASTER_KEY }}
          JSONBIN_PRICE_BIN_ID: ${{ secrets.JSONBIN_PRICE_BIN_ID }}
        run: node sync_prices.js
