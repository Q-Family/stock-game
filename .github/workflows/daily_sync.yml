async function performDailyPriceSync() {
    try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${PRICE_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JBIN_KEY }
        });
        const data = await response.json();
        const latestPrices = data.record?.prices;

        if (!latestPrices || Object.keys(latestPrices).length === 0) {
            console.warn('Price bin empty — using seed prices');
            ensurePriceSeed();
            return;
        }

        const today = new Date().toISOString().split('T')[0];
        sp100Data.forEach(stock => {
            if (latestPrices[stock.t]) {
                stock.lastClose = latestPrices[stock.t];
                saveLastKnownPrice(stock.t, latestPrices[stock.t], today);
            }
        });

        console.log('Prices successfully updated from vault.');
        updateUI(); // refresh holdings panel with new prices

    } catch (err) {
        console.error('Sync failed — using seed prices:', err);
        ensurePriceSeed();
    }
}
