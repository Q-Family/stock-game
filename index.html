let currentUser  = '';

function getCurrentPrice() {

}

// ═══════════════════════════════════════════════════════════════════
//  LOGIN STATUS HELPER
// ═══════════════════════════════════════════════════════════════════
function setStatus(msg, type) {
    const el = document.getElementById('login-status');
    const colors = { info:'#60a5fa', success:'#4ade80', warn:'#fb923c', error:'#f87171' };
    const spinning = type === 'info';
    el.innerHTML = (spinning ? '<span class="spinner"></span>' : '') +
        `<span style="color:${colors[type]||colors.info}">${msg}</span>`;
}

// ═══════════════════════════════════════════════════════════════════
//  JSONBIN — simple fetch with timeout
// ═══════════════════════════════════════════════════════════════════
async function jbFetch(path, method='GET', body=null) {
    const ctrl = new AbortController();
    const t    = setTimeout(() => ctrl.abort(), 8000);
    try {
        const opts = { method, headers:{'X-Master-Key':JBIN_KEY}, signal:ctrl.signal };
        if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type']='application/json'; }
        const r = await fetch(JBIN_BASE+path, opts);
        clearTimeout(t);
        if (!r.ok) throw new Error(`${r.status}`);
        return r.json();
    } catch(e) { clearTimeout(t); throw e; }
}

// ═══════════════════════════════════════════════════════════════════
//  LOCAL STORAGE HELPERS
// ═══════════════════════════════════════════════════════════════════
const ls = {
    get:  k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
    set:  (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
    raw:  k => localStorage.getItem(k),
    keys: () => Object.keys(localStorage)
};

function getPortfolioLocal(codename) { return ls.get('pf_'+codename); }
function setPortfolioLocal(codename, data) { ls.set('pf_'+codename, data); }
function getBinId(codename) { return (ls.get('jb_ids')||{})[codename]||null; }
function setBinId(codename, id) { const m=ls.get('jb_ids')||{}; m[codename]=id; ls.set('jb_ids',m); }

// ═══════════════════════════════════════════════════════════════════
//  CLOUD PORTFOLIO — load and save
// ═══════════════════════════════════════════════════════════════════
async function cloudLoad(codename) {
    // Try cached bin ID first (fast path — same device returning)
    let binId = getBinId(codename);

    if (!binId) {
        // Read index bin to find this student's bin
        const idx = await jbFetch(`/b/${INDEX_BIN_ID}/latest`);
        binId = idx?.record?.[codename] || null;
        if (binId) setBinId(codename, binId);
    }

    if (!binId) return null; // brand new student

    const data = await jbFetch(`/b/${binId}/latest`);
    const portfolio = data?.record || null;
    if (portfolio) setPortfolioLocal(codename, portfolio);
    return portfolio;
}

async function cloudSave(codename, portfolio) {
    let binId = getBinId(codename);

    if (!binId) {
        // Create new bin for this student
        const created = await jbFetch('/b', 'POST', portfolio);
        binId = created?.metadata?.id;
        if (!binId) throw new Error('Failed to create bin');
        setBinId(codename, binId);
        // Register in index
        const idx = await jbFetch(`/b/${INDEX_BIN_ID}/latest`);
        const map = idx?.record || {};
        map[codename] = binId;
        await jbFetch(`/b/${INDEX_BIN_ID}`, 'PUT', map);
    } else {
        await jbFetch(`/b/${binId}`, 'PUT', portfolio);
    }
    setPortfolioLocal(codename, portfolio);
}

// ═══════════════════════════════════════════════════════════════════
//  SAVE BANNER + DEBOUNCED SAVE
// ═══════════════════════════════════════════════════════════════════
let bannerTimer=null, saveTimer=null;

function showBanner(cls, msg) {
    const b = document.getElementById('save-banner');
    b.textContent = msg; b.className = cls;
    clearTimeout(bannerTimer);
    if (cls==='saved') bannerTimer = setTimeout(()=>{ b.className=''; }, 2500);
}

function scheduleSave() {
    clearTimeout(saveTimer);
    showBanner('saving','⟳  SAVING...');
    saveTimer = setTimeout(async () => {
        try {
            await cloudSave(currentUser, userData);
            showBanner('saved','✓  SAVED');
        } catch(e) {
            setPortfolioLocal(currentUser, userData);
            showBanner('error','⚠  SAVE FAILED — LOCAL COPY KEPT');

    }, 1000);
}

function seedPrices() {
    const store = ls.get('last_known') || {};
    let changed = false;
    Object.entries(SEED).forEach(([t,p]) => {
        if (!store[t]) { store[t]={price:p,date:'2026-04-17'}; changed=true; }
    });
    if (changed) ls.set('last_known', store);
}

function savePrice(ticker, price, date) {
    const store = ls.get('last_known') || {};
    store[ticker] = { price, date };
    ls.set('last_known', store);
}

function getPrice(ticker) {
    return (ls.get('last_known')||{})[ticker] || null;
}

// ═══════════════════════════════════════════════════════════════════
//  DAILY PRICE SYNC from JSONBin price bin (written by sync.js)
// ═══════════════════════════════════════════════════════════════════
async function syncPricesFromBin() {
    if (!PRICE_BIN_ID) return false;
    try {
        const data = await jbFetch(`/b/${PRICE_BIN_ID}/latest`);
        const prices = data?.record?.prices;
        const date   = data?.record?.date || new Date().toISOString().split('T')[0];
        if (!prices || !Object.keys(prices).length) return false;
        const store = ls.get('last_known') || {};
        Object.entries(prices).forEach(([t,p]) => { store[t]={price:p,date}; });
        ls.set('last_known', store);
        return true;
    } catch(e) { return false; }
}

// ═══════════════════════════════════════════════════════════════════
//  CORS PROXY FETCH for Yahoo Finance chart data
// ═══════════════════════════════════════════════════════════════════
async function proxyFetch(url) {
    const proxies = [
        'https://corsproxy.io/?url=',
        'https://api.allorigins.win/raw?url=',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    for (const p of proxies) {
        try {
            const r = await Promise.race([
                fetch(p + encodeURIComponent(url)),
                new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')),6000))
            ]);
            if (r.ok) return r;
        } catch(e) { continue; }
    }
    throw new Error('All proxies failed');
}

// ═══════════════════════════════════════════════════════════════════
//  FETCH CHART HISTORY for a ticker (cache-first, network fallback)
// ═══════════════════════════════════════════════════════════════════
async function fetchHistory(ticker) {
    const today    = new Date().toISOString().split('T')[0];
    const cacheKey = `hist_${ticker}_${today}`;

    // Return cached data immediately if available
    const cached = ls.get(cacheKey);
    if (cached) return cached;

    // Clear old dated caches for this ticker
    ls.keys().filter(k => k.startsWith(`hist_${ticker}_`) && k !== cacheKey)
             .forEach(k => localStorage.removeItem(k));

    // Try to fetch fresh data
    try {
        const toTs   = Math.floor(Date.now()/1000);
        const fromTs = toTs - 2*365*24*3600;
        const url    = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${fromTs}&period2=${toTs}`;
        const r      = await proxyFetch(url);
        const json   = await r.json();
        const result = json?.chart?.result?.[0];
        if (result) {
            const history = result.timestamp.map((t,i) => ({
                date:  new Date(t*1000).toLocaleDateString(),
                price: result.indicators.quote[0].close[i]
            })).filter(h => h.price != null);
            ls.set(cacheKey, history);
            return history;
        }
    } catch(e) { /* fall through */ }

    // Fall back to most recent previously cached history
    const prevKey = ls.keys()
        .filter(k => k.startsWith(`hist_${ticker}_`))
        .sort().pop();
    return prevKey ? ls.get(prevKey) : null;
}

// ═══════════════════════════════════════════════════════════════════
//  LOGIN — instant, background sync
// ═══════════════════════════════════════════════════════════════════
async function login() {
    const codename = document.getElementById('codename').value.trim().toUpperCase();
    if (!codename) return;

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'LOADING...';
    setStatus('Loading...', 'info');

    currentUser = codename;

    // Step 1 — Use local cache for instant display
    seedPrices();
    const local = getPortfolioLocal(codename);
    if (local) userData = local;

    // Step 2 — Show dashboard immediately
    document.getElementById('display-name').textContent = 'SESSION: ' + codename;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    populateDropdown();
    updateUI();

    btn.disabled = false;
    btn.textContent = 'ACCESS TERMINAL';

    // Step 3 — Run all sync in background (non-blocking)
    runBackgroundSync(codename);
}

async function runBackgroundSync(codename) {
    const syncEl = document.getElementById('sync-status');

    // A — Sync portfolio from cloud
    syncEl.textContent = 'SYNCING...';
    syncEl.classList.add('sync-pulse');
    try {
        const cloud = await cloudLoad(codename);
        if (cloud) {
            userData = cloud;
            updateUI();
        } else if (!getPortfolioLocal(codename)) {
            // New student — create cloud record
            await cloudSave(codename, userData);
        }
    } catch(e) { console.warn('Cloud load failed:', e.message); }

    // B — Sync price bin
    try {
        const synced = await syncPricesFromBin();
        if (synced) updateUI();
    } catch(e) { /* silent */ }

    // C — Fetch real chart prices for all held stocks (parallel, 5s max each)
    const tickers = Object.keys(userData.holdings);
    if (tickers.length) {
        syncEl.textContent = 'UPDATING...';
        await Promise.allSettled(tickers.map(async ticker => {
            try {
                const history = await Promise.race([
                    fetchHistory(ticker),
                    new Promise((_,r) => setTimeout(()=>r(new Error('timeout')),5000))
                ]);
                if (history && history.length) {
                    const last = history[history.length-1];
                    savePrice(ticker, last.price, new Date().toISOString().split('T')[0]);
                }
            } catch(e) { /* silent — seed price stays */ }
        }));
        updateUI();
    }

    // D — Load AAPL chart
    syncEl.textContent = 'CHARTING...';
    try { await loadStock('AAPL'); } catch(e) { /* silent */ }

    syncEl.classList.remove('sync-pulse');
    syncEl.textContent = 'LIVE';
    syncEl.style.color = '#4ade80';
    setTimeout(() => { syncEl.style.color=''; syncEl.textContent='READY'; }, 4000);
}

// ═══════════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════════
function updateUI() {
    document.getElementById('cash-balance').textContent =
        '$' + userData.cash.toLocaleString(undefined,{minimumFractionDigits:2});

    let total = 0;
    const list = document.getElementById('holdings-list');
    list.innerHTML = '';

    Object.entries(userData.holdings).forEach(([t,h]) => {
        const known = getPrice(t);
        const cp    = known ? known.price : 0;
        const val   = h.qty * cp;
        const chg   = val - (h.qty * h.avgPrice);
        total += val;
        list.innerHTML += `
            <tr onclick="loadStock('${t}')" class="cursor-pointer hover:bg-slate-800 transition">
                <td class="py-3">
                    <div class="font-black text-blue-400">${t}</div>
                    <div class="text-[8px] text-slate-500">${h.qty} shares</div>
                    ${known?`<div class="text-[8px] text-slate-600">${known.date}</div>`:''}
                </td>
                <td class="py-3 text-right font-bold">${cp?'$'+val.toLocaleString(undefined,{minimumFractionDigits:2}):'---'}</td>
                <td class="py-3 text-right font-bold ${chg>=0?'text-green-400':'text-red-400'}">
                    ${cp?(chg>=0?'+':'')+chg.toLocaleString(undefined,{minimumFractionDigits:2}):'---'}
                </td>
            </tr>`;
    });

    document.getElementById('stock-valuation').textContent =
        '$' + total.toLocaleString(undefined,{minimumFractionDigits:2});
    document.getElementById('net-worth').textContent =
        '$' + (userData.cash+total).toLocaleString(undefined,{minimumFractionDigits:2});
}

function populateDropdown() {
    document.getElementById('ticker-select').innerHTML =
        sp100Data.map(s=>`<option value="${s.t}">${s.t} – ${s.n}</option>`).join('');
}

// ═══════════════════════════════════════════════════════════════════
//  TRADING
// ═══════════════════════════════════════════════════════════════════
async function executeTrade(type) {
    const qty   = parseInt(document.getElementById('trade-qty').value)||0;
    const live  = getCurrentPrice();
    const known = getPrice(activeStock.ticker);
    const price = live || (known?known.price:0);
    if (!qty||!price||!activeStock.ticker) return;

    if (!userData.holdings[activeStock.ticker])
        userData.holdings[activeStock.ticker] = {qty:0,avgPrice:0};
    const h = userData.holdings[activeStock.ticker];

    if (type==='BUY' && userData.cash>=qty*price) {
        userData.cash -= qty*price;
        h.avgPrice = ((h.qty*h.avgPrice)+(qty*price))/(h.qty+qty);
        h.qty += qty;
    } else if (type==='SELL' && h.qty>=qty) {
        userData.cash += qty*price;
        h.qty -= qty;
        if (!h.qty) delete userData.holdings[activeStock.ticker];
    } else return;

    updateUI();
    scheduleSave();
}

// ═══════════════════════════════════════════════════════════════════
//  CHART
// ═══════════════════════════════════════════════════════════════════
async function loadStock(ticker) {
    if (!ticker) return;
    document.getElementById('ticker-select').value = ticker;
    const thisReq = ++loadRequestId;

    document.getElementById('trade-ticker-label').textContent = ticker;

    const info = sp100Data.find(s=>s.t===ticker);
    if (info) {
        document.getElementById('summary-name').textContent   = info.n;
        document.getElementById('summary-sector').textContent = info.s;
        document.getElementById('summary-desc').textContent   = info.d;
        document.getElementById('stock-summary').classList.remove('hidden');
    }

    // Show known price immediately while fetching
    const known = getPrice(ticker);
    if (known) {
        document.getElementById('current-price').textContent =
            '$'+known.price.toLocaleString(undefined,{minimumFractionDigits:2});
        document.getElementById('effective-date-val').textContent = known.date;
    } else {
        document.getElementById('current-price').textContent = '···';
    }

    const history = await fetchHistory(ticker);
    if (thisReq !== loadRequestId) return;

    if (history && history.length) {
        const prices   = history.map(h=>h.price);
        const lastP    = prices[prices.length-1];
        const lastD    = history[history.length-1].date;

        savePrice(ticker, lastP, lastD);

        activeStock = {
            ticker, dates:history.map(h=>h.date), prices,
            sma50:calcSMA(prices,50), sma200:calcSMA(prices,200)
        };

        document.getElementById('current-price').textContent =
            '$'+lastP.toLocaleString(undefined,{minimumFractionDigits:2});
        document.getElementById('effective-date-val').textContent = lastD;
        document.getElementById('sync-status').textContent = 'LIVE';
        document.getElementById('sync-status').style.color = '#4ade80';

        setTimeout(()=>updateTrendRange('1Y'), 0);
        updateUI();
    } else if (known) {
        document.getElementById('sync-status').textContent = 'LAST KNOWN';
        document.getElementById('sync-status').style.color = '#fb923c';
    }
}

function calcSMA(data, period) {
    return data.map((_,i) => i<period-1 ? null :
        data.slice(i-period+1,i+1).reduce((a,b)=>a+b,0)/period);
}

function updateTrendRange(range, btn) {
    if (btn) { document.querySelectorAll('.btn-range').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
    const n = {'30D':30,'6M':126,'1Y':252,'2Y':504}[range]||252;
    renderChart(activeStock.dates.slice(-n),activeStock.prices.slice(-n),
                activeStock.sma50.slice(-n),activeStock.sma200.slice(-n));
}

function renderChart(labels, p, s50, s200) {
    const ctx = document.getElementById('stockChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[
            {label:'Price',  data:p,   borderColor:'#3b82f6',borderWidth:2,pointRadius:0,fill:true,backgroundColor:'rgba(59,130,246,0.05)'},
            {label:'50 SMA', data:s50, borderColor:'#fbbf24',borderWidth:1,pointRadius:0},
            {label:'200 SMA',data:s200,borderColor:'#ef4444',borderWidth:1,pointRadius:0}
        ]},
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:true,labels:{color:'#94a3b8',font:{size:10,weight:'800'}}}},
            scales:{
                x:{ticks:{color:'#475569',maxTicksLimit:8},grid:{display:false}},
                y:{grid:{color:'#1e293b'},ticks:{color:'#475569'}}
            }
        }
    });
}
