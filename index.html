const JBIN_BASE     = 'https://api.jsonbin.io/v3';
const COLLECTION_ID = '69e173be36566621a8c002aa';

// PRICE_BIN_ID: the bin your daily sync script writes all 100 prices into.
// Set this to the bin ID your sync.js creates on first run.
const PRICE_BIN_ID  = '69e6c79e856a682189560999';   // <-- paste your price bin ID here after running sync.js once

let INDEX_BIN_ID = '69e1c730856a68218942820b';

// =================================================================
//  LOW-LEVEL JSONBIN API
// =================================================================
async function apiFetch(path, method = 'GET', body = null) {
    const headers = { 'X-Master-Key': JBIN_KEY };
    if (body !== null) headers['Content-Type'] = 'application/json';
    const resp = await fetch(JBIN_BASE + path, {
        method,
        headers,
        body: body !== null ? JSON.stringify(body) : undefined
    });
    if (!resp.ok) {
        const err = await resp.text();
        throw new Error(`JSONBin ${method} ${path} → ${resp.status}: ${err}`);
    }
    return resp.json();
}

// =================================================================
//  INDEX BIN  — maps { CODENAME: binId, ... }
//  Lives at a fixed ID so any device can always find it.
// =================================================================
async function ensureIndexBin() {
    if (INDEX_BIN_ID) return;

    // Check local cache first
    const cached = localStorage.getItem('jb_index_id');
    if (cached) { INDEX_BIN_ID = cached; return; }

    // First ever run — create the index bin and show ID on screen
    showSetupBanner('⟳ Creating cloud index...');
    const data = await apiFetch('/b', 'POST', { _index: true });
    INDEX_BIN_ID = data.metadata.id;
    localStorage.setItem('jb_index_id', INDEX_BIN_ID);
    showSetupBanner(
        '✅ INDEX BIN CREATED — paste this ID to Claude to hardcode it:\n' + INDEX_BIN_ID,
        true
    );
}

// Visible on-screen banner on the login page for the teacher setup step
function showSetupBanner(msg, persist) {
    let el = document.getElementById('setup-banner');
    if (!el) {
        el = document.createElement('div');
        el.id = 'setup-banner';
        el.style.cssText = [
            'position:fixed','top:0','left:0','right:0','z-index:9999',
            'background:#1e3a5f','color:#93c5fd','font-size:13px',
            'font-weight:700','padding:14px 20px','text-align:center',
            'white-space:pre-wrap','word-break:break-all','line-height:1.6'
        ].join(';');
        document.body.prepend(el);
    }
    el.textContent = msg;
    if (!persist) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

// Run index setup immediately when the page loads — before any login
window.addEventListener('DOMContentLoaded', () => {
    ensureIndexBin().catch(e => {
        showSetupBanner('⚠ Could not reach JSONBin: ' + e.message, true);
    });
});

async function readIndex() {
    await ensureIndexBin();
    const data = await apiFetch(`/b/${INDEX_BIN_ID}/latest`);
    return data.record || {};
}

async function writeIndex(index) {
    await ensureIndexBin();
    await apiFetch(`/b/${INDEX_BIN_ID}`, 'PUT', index);
}

// =================================================================
//  STUDENT BIN  — stores { cash, holdings }
// =================================================================
async function readBin(binId) {
    const data = await apiFetch(`/b/${binId}/latest`);
    return data.record || null;
}

async function createBin(portfolio) {
    const data = await apiFetch('/b', 'POST', portfolio);
    return data.metadata.id;
}

async function updateBin(binId, portfolio) {
    await apiFetch(`/b/${binId}`, 'PUT', portfolio);
}

// =================================================================
//  LOCAL MIRRORS  (speed + offline fallback — device-only)
// =================================================================
function localPortfolioSet(codename, data) {
    try { localStorage.setItem('pf_' + codename, JSON.stringify(data)); } catch(e) {}
}
function localPortfolioGet(codename) {
    try { const r = localStorage.getItem('pf_' + codename); return r ? JSON.parse(r) : null; }
    catch(e) { return null; }
}
// Per-device bin ID cache — avoids re-reading index every login on same browser
function localBinIdGet(codename) {
    try { return JSON.parse(localStorage.getItem('jb_ids') || '{}')[codename] || null; }
    catch(e) { return null; }
}
function localBinIdSet(codename, binId) {
    try {
        const m = JSON.parse(localStorage.getItem('jb_ids') || '{}');
        m[codename] = binId; localStorage.setItem('jb_ids', JSON.stringify(m));
    } catch(e) {}
}

// =================================================================
//  HIGH-LEVEL CLOUD LOAD / SAVE
// =================================================================
async function cloudLoad(codename) {
    // 1. Check local bin-ID cache first (fast path for returning devices)
    let binId = localBinIdGet(codename);

    if (!binId) {
        // 2. Read the master index — works on ANY device, ANY browser
        const index = await readIndex();
        binId = index[codename] || null;
        if (binId) localBinIdSet(codename, binId);
    }

    if (!binId) return null;   // genuinely new student

    // 3. Fetch their portfolio
    const portfolio = await readBin(binId);
    if (portfolio) localPortfolioSet(codename, portfolio);
    return portfolio;
}

async function cloudSave(codename, portfolio) {
    let binId = localBinIdGet(codename);

    if (binId) {
        // Fast path — bin already known, just update it
        await updateBin(binId, portfolio);
    } else {
        // New student — create bin, register in index
        binId = await createBin(portfolio);
        localBinIdSet(codename, binId);

        // Update the master index so other devices can find this student
        const index = await readIndex();
        index[codename] = binId;
        await writeIndex(index);
    }

    localPortfolioSet(codename, portfolio);
}

// =================================================================

let bannerTimer = null;
function showBanner(type, msg) {
    const b = document.getElementById('save-banner');
    b.textContent = msg;
    b.className = type;
    clearTimeout(bannerTimer);
    if (type === 'saved') {
        bannerTimer = setTimeout(() => { b.className = 'hide'; }, 2500);
    }
}

// =================================================================
//  DEBOUNCED SAVE  (1 s after last trade)
// =================================================================
let saveTimer = null;
function scheduleSave() {
    clearTimeout(saveTimer);
    showBanner('saving', '⟳  SAVING TO CLOUD...');
    saveTimer = setTimeout(async () => {
        try {
            await cloudSave(currentUser, userData);
            showBanner('saved', '✓  PORTFOLIO SAVED');
        } catch(e) {
            console.error('Cloud save error:', e);
            localPortfolioSet(currentUser, userData);
            showBanner('error', '⚠  CLOUD SAVE FAILED · DATA KEPT LOCALLY');
        }
    }, 1000);
}

function saveLastKnownPrice(ticker, price, dateStr) {
    try {
        const store = JSON.parse(localStorage.getItem('last_known_prices') || '{}');
        store[ticker] = { price, date: dateStr };
        localStorage.setItem('last_known_prices', JSON.stringify(store));
    } catch(e) {}
}
function getLastKnownPrice(ticker) {
    try {
        const store = JSON.parse(localStorage.getItem('last_known_prices') || '{}');
        return store[ticker] || null;
    } catch(e) { return null; }
}
function ensurePriceSeed() {
    try {
        const store = JSON.parse(localStorage.getItem('last_known_prices') || '{}');
        let changed = false;
        Object.entries(SEED_PRICES).forEach(([t, p]) => {
            if (!store[t]) { store[t] = { price: p, date: '2026-04-17' }; changed = true; }
        });
        if (changed) localStorage.setItem('last_known_prices', JSON.stringify(store));
    } catch(e) {}
}

// =================================================================
//  DAILY PRICE SYNC — reads from the JSONBin price bin written by sync.js
//  Falls back to seed prices if bin is empty or unreachable.
// =================================================================
async function performDailyPriceSync() {
    // Skip if no price bin configured yet
    if (!PRICE_BIN_ID) {
        console.log('No PRICE_BIN_ID set — using seed prices');
        ensurePriceSeed();
        return;
    }

    try {
        const response = await fetch(`${JBIN_BASE}/b/${PRICE_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JBIN_KEY }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data         = await response.json();
        const latestPrices = data.record?.prices;   // { "AAPL": 198.15, "MSFT": 369.24, ... }

        if (!latestPrices || Object.keys(latestPrices).length === 0) {
            console.warn('Price bin empty — falling back to seed prices');
            ensurePriceSeed();
            return;
        }

        // Write all prices into last_known_prices so the entire app can use them
        const today = new Date().toISOString().split('T')[0];
        const syncDate = data.record?.date || today;   // sync script should include the date it ran

        sp100Data.forEach(stock => {
            if (latestPrices[stock.t]) {
                stock.lastClose = latestPrices[stock.t];                        // in-memory
                saveLastKnownPrice(stock.t, latestPrices[stock.t], syncDate);   // localStorage
            }
        });

        console.log(`Prices synced from vault (${Object.keys(latestPrices).length} stocks, dated ${syncDate})`);
        document.getElementById('sync-status').textContent = 'SYNCED';
        document.getElementById('sync-status').style.color = '#4ade80';

    } catch(err) {
        console.error('Price sync failed — using seed prices:', err.message);
        ensurePriceSeed();
    }
}

// Try multiple CORS proxies in sequence until one works
async function fetchWithProxies(url) {
    const proxies = [
        'https://corsproxy.io/?url=',
        'https://api.allorigins.win/raw?url=',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    const errors = [];
    for (const proxy of proxies) {
        try {
            const proxyUrl = proxy + encodeURIComponent(url);
            const resp = await Promise.race([
                fetch(proxyUrl),
                new Promise((_,r) => setTimeout(() => r(new Error('timeout')), 10000))
            ]);
            // Log exact status for debugging
            console.log(`Proxy ${proxy} → status ${resp.status}`);
            if (resp.ok) return resp;
            // Read error body for diagnosis
            const body = await resp.text().catch(() => '(unreadable)');
            errors.push(`${proxy} → ${resp.status}: ${body.slice(0, 120)}`);
        } catch(e) {
            errors.push(`${proxy} → ${e.message}`);
            continue;
        }
    }
    // Show all errors visibly on screen so we can diagnose
    showSetupBanner('⚠ All proxies failed for:\n' + url.slice(0,80) + '\n\n' + errors.join('\n'), true);
    throw new Error('All proxies failed: ' + errors.join(' | '));
}

async function login() {
    const codename = document.getElementById('codename').value.trim().toUpperCase();
    if (!codename) return;

    const btn    = document.getElementById('login-btn');
    const msgEl  = document.getElementById('login-msg');
    btn.disabled = true;
    btn.textContent = 'CONNECTING...';
    msgEl.style.color = '#60a5fa';
    msgEl.textContent = 'Loading your portfolio from cloud...';

    currentUser = codename;

    try {
        const cloudData = await cloudLoad(codename);
        if (cloudData) {
            userData = cloudData;
            msgEl.style.color = '#4ade80';
            msgEl.textContent = 'Portfolio loaded ✓';
        } else {
            // Brand new student — create their bin immediately
            userData = { cash: 100000, holdings: {} };
            msgEl.style.color = '#60a5fa';
            msgEl.textContent = 'New account — setting up...';
            await cloudSave(codename, userData);
            msgEl.style.color = '#4ade80';
            msgEl.textContent = 'Account created ✓';
        }
    } catch(e) {
        console.error('Login error:', e);
        // Offline fallback — use local mirror if it exists
        const local = localPortfolioGet(codename);
        userData = local || { cash: 100000, holdings: {} };
        msgEl.style.color = '#fb923c';
        msgEl.textContent = local
            ? '⚠ Cloud unreachable — loaded local copy'
            : '⚠ Cloud unreachable — starting offline';
    }

    document.getElementById('display-name').textContent = 'SESSION: ' + codename;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    populateTickerDropdown();
    updateUI();
    document.getElementById('sync-status').textContent = 'SYNCING...';
    document.getElementById('sync-status').classList.add('sync-pulse');
    await performDailyPriceSync();
    document.getElementById('sync-status').classList.remove('sync-pulse');
    await loadStock('AAPL');

    btn.disabled    = false;
    btn.textContent = 'ACCESS TERMINAL';
}

// =================================================================
//  TRADING  — price comes from chart's last bar only
// =================================================================
async function executeTrade(type) {
    const qty = parseInt(document.getElementById('trade-qty').value) || 0;
    // Use live chart price if available, otherwise last-known price
    const livePrice = getCurrentPrice();
    const known     = getLastKnownPrice(activeStock.ticker);
    const price     = livePrice || (known ? known.price : 0);
    if (qty <= 0 || price <= 0 || !activeStock.ticker) return;

    if (!userData.holdings[activeStock.ticker])
        userData.holdings[activeStock.ticker] = { qty: 0, avgPrice: 0 };
    const h = userData.holdings[activeStock.ticker];

    if (type === 'BUY' && userData.cash >= qty * price) {
        userData.cash -= qty * price;
        h.avgPrice = ((h.qty * h.avgPrice) + (qty * price)) / (h.qty + qty);
        h.qty += qty;
    } else if (type === 'SELL' && h.qty >= qty) {
        userData.cash += qty * price;
        h.qty -= qty;
        if (h.qty === 0) delete userData.holdings[activeStock.ticker];
    } else {
        return;
    }

    updateUI();
    scheduleSave();
}

// =================================================================
//  UI  — holdings valued at each stock's last chart price
// =================================================================
function updateUI() {
    document.getElementById('cash-balance').textContent =
        '$' + userData.cash.toLocaleString(undefined, { minimumFractionDigits: 2 });

    let totalVal = 0;
    const list   = document.getElementById('holdings-list');
    list.innerHTML = '';

    Object.entries(userData.holdings).forEach(([t, h]) => {
        const known = getLastKnownPrice(t);
        const cp    = known ? known.price : 0;
        const val   = h.qty * cp;
        const chg   = val - (h.qty * h.avgPrice);
        totalVal   += val;
        const valStr = cp ? '$' + val.toLocaleString(undefined,{minimumFractionDigits:2}) : '---';
        const chgStr = cp ? (chg>=0?'+':'') + chg.toLocaleString(undefined,{minimumFractionDigits:2}) : '---';
        list.innerHTML += `
            <tr onclick="loadStock('${t}')" class="cursor-pointer hover:bg-slate-800 transition">
                <td class="py-3">
                    <div class="font-black text-blue-400">${t}</div>
                    <div class="text-[8px] text-slate-500 uppercase">${h.qty} shares</div>
                    ${known ? `<div class="text-[8px] text-slate-600">${known.date}</div>` : ''}
                </td>
                <td class="py-3 text-right font-bold">${valStr}</td>
                <td class="py-3 text-right font-bold ${chg>=0?'text-green-400':'text-red-400'}">${chgStr}</td>
            </tr>`;
    });

    document.getElementById('stock-valuation').textContent =
        '$' + totalVal.toLocaleString(undefined, { minimumFractionDigits: 2 });
    document.getElementById('net-worth').textContent =
        '$' + (userData.cash + totalVal).toLocaleString(undefined, { minimumFractionDigits: 2 });
}

// =================================================================
//  CHART & STOCK LOADING
// =================================================================

// Request ID prevents stale async fetches from overwriting a newer selection
let loadRequestId = 0;

async function loadStock(ticker) {
    if (!ticker) return;
    document.getElementById('ticker-select').value = ticker;

    const thisRequest = ++loadRequestId;

    // Show ticker label and summary immediately — before any branching
    document.getElementById('trade-ticker-label').textContent = ticker;

    const info = sp100Data.find(s => s.t === ticker);
    if (info) {
        document.getElementById('summary-name').textContent   = info.n;
        document.getElementById('summary-sector').textContent = info.s;
        document.getElementById('summary-desc').textContent   = info.d;
        document.getElementById('stock-summary').classList.remove('hidden');
    }

    ensurePriceSeed();
    const today    = new Date().toISOString().split('T')[0];
    const cacheKey = 'history_' + ticker + '_' + today;
    let history    = JSON.parse(localStorage.getItem(cacheKey) || 'null');

    if (!history) {
        // Show loading state only when network call is needed
        document.getElementById('current-price').textContent = '···';
        document.getElementById('effective-date-val').textContent = '···';
        document.getElementById('sync-status').textContent = 'LOADING...';
        document.getElementById('sync-status').style.color = '';
        document.getElementById('sync-status').classList.add('sync-pulse');

        Object.keys(localStorage)
            .filter(k => k.startsWith('history_' + ticker + '_') && k !== cacheKey)
            .forEach(k => localStorage.removeItem(k));

        try {
            const toTs   = Math.floor(Date.now() / 1000);
            const fromTs = toTs - (2 * 365 * 24 * 3600);
            const url    = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${fromTs}&period2=${toTs}`;
            const resp   = await fetchWithProxies(url);
            if (thisRequest !== loadRequestId) return;
            const data   = await resp.json();
            const result = data?.chart?.result?.[0];
            if (result) {
                history = result.timestamp.map((t,i) => ({
                    date:  new Date(t*1000).toLocaleDateString(),
                    price: result.indicators.quote[0].close[i]
                })).filter(h => h.price != null);
                localStorage.setItem(cacheKey, JSON.stringify(history));
            }
        } catch(e) {
            console.warn('Live fetch failed:', e.message);
        }

        document.getElementById('sync-status').classList.remove('sync-pulse');

        if (!history) {
            const prevKey = Object.keys(localStorage)
                .filter(k => k.startsWith('history_' + ticker + '_'))
                .sort().pop();
            if (prevKey) history = JSON.parse(localStorage.getItem(prevKey) || 'null');
        }
    }

    if (thisRequest !== loadRequestId) return;

    if (history && history.length) {
        const prices    = history.map(h => h.price);
        const lastPrice = prices[prices.length - 1];
        const lastDate  = history[history.length - 1].date;

        saveLastKnownPrice(ticker, lastPrice, lastDate);

        activeStock = {
            ticker,
            dates:  history.map(h => h.date),
            prices,
            sma50:  calcSMA(prices, 50),
            sma200: calcSMA(prices, 200)
        };

        // Price = last bar of chart, always
        document.getElementById('current-price').textContent =
            '$' + lastPrice.toLocaleString(undefined, { minimumFractionDigits: 2 });
        document.getElementById('effective-date-val').textContent = lastDate;
        document.getElementById('sync-status').textContent = 'LIVE DATA';
        document.getElementById('sync-status').style.color = '';

        // Defer chart render by one frame so canvas is ready after prior destroy
        setTimeout(() => updateTrendRange('1Y'), 0);

    } else {
        const known = getLastKnownPrice(ticker);
        if (known) {
            document.getElementById('current-price').textContent =
                '$' + known.price.toLocaleString(undefined, { minimumFractionDigits: 2 });
            document.getElementById('effective-date-val').textContent = known.date;
            document.getElementById('sync-status').textContent = 'LAST KNOWN';
            document.getElementById('sync-status').style.color = '#fb923c';
        } else {
            document.getElementById('current-price').textContent = '---';
            document.getElementById('effective-date-val').textContent = 'No data';
            document.getElementById('sync-status').textContent = 'NO DATA';
            document.getElementById('sync-status').style.color = '#f87171';
        }
    }

    updateUI();
}

function calcSMA(data, period) {
    return data.map((_,i) => i < period-1 ? null :
        data.slice(i-period+1, i+1).reduce((a,b) => a+b, 0) / period);
}

function updateTrendRange(range, btn) {
    if (btn) { document.querySelectorAll('.btn-range').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    const n = { '30D':30,'6M':126,'1Y':252,'2Y':504 }[range] || 252;
    renderChart(
        activeStock.dates.slice(-n),
        activeStock.prices.slice(-n),
        activeStock.sma50.slice(-n),
        activeStock.sma200.slice(-n)
    );
}

function renderChart(labels, p, s50, s200) {
    const ctx = document.getElementById('stockChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label:'Price',   data:p,   borderColor:'#3b82f6', borderWidth:2, pointRadius:0, fill:true, backgroundColor:'rgba(59,130,246,0.05)' },
                { label:'50 SMA',  data:s50,  borderColor:'#fbbf24', borderWidth:1, pointRadius:0 },
                { label:'200 SMA', data:s200, borderColor:'#ef4444', borderWidth:1, pointRadius:0 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display:true, labels: { color:'#94a3b8', font:{ size:10, weight:'800' } } } },
            scales: {
                x: { ticks:{ color:'#475569', maxTicksLimit:8 }, grid:{ display:false } },
                y: { grid:{ color:'#1e293b' }, ticks:{ color:'#475569' } }
            }
        }
    });
}
